   <!DOCTYPE html> <!-- Тип документа -->
<html lang="ru"> <!-- Корневой элемент -->
<head> <!-- Шапка -->
    <meta charset="UTF-8"> <!-- Кодировка -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Адаптивность -->
    <title>Каталог - TechStore</title> <!-- Заголовок -->
    <link rel="stylesheet" href="styles.css"> <!-- Стили -->
</head> <!-- Конец head -->
<body> <!-- Тело -->
   <main class="main">
           <div class="container">
               <div class="content-wrapper-full">
                   <div class="content">
                       <h2>Оформление заказа</h2>
                       <div class="checkout-container">
                          <div class="checkout-form-section">
                               <h3>Данные покупателя</h3>
                               <form id="checkoutForm" class="checkout-form">
                                   <div class="form-group">
                                       <label for="fullName">ФИО *</label>
                                       <input type="text" id="fullName" name="fullName"
                                              required placeholder="Иванов Иван Иванович">
                                   </div>
                                   <div class="form-group">
                                       <label for="phone">Телефон *</label>
                                       <input type="tel" id="phone" name="phone"
                                              required placeholder="+7 (___) ___-__-__">
                                   </div>
                                   <div class="form-group">
                                       <label for="email">Email *</label>
                                       <input type="email" id="email" name="email"
                                              required placeholder="example@mail.ru">
                                   </div>
                                   <h3>Адрес доставки</h3>
                                   <div class="form-group">
                                       <label for="city">Город *</label>
                                       <input type="text" id="city" name="city"
                                              required placeholder="Москва">
                                   </div>
                                   <div class="form-group">
                                       <label for="street">Улица *</label>
                                       <input type="text" id="street" name="street"
                                              required placeholder="ул. Примерная">
                                   </div>
                                   <button type="submit" class="btn btn-primary">
                                       Подтвердить заказ
                                   </button>
                               </form>
                           </div>
                           <div class="order-summary" id="orderSummary">
                               <!-- заполнится из checkout.js -->
                           </div>
                       </div>
                   </div>
               </div>
           </div>
       </main>
       <script src="data.js"></script>
       <script src="checkout.js"></script>
       <script src="auth.js"></script>

           <footer class="footer"> <!-- Подвал -->
        <div class="container"> <!-- Контейнер -->
            <p>&copy; 2026 TechStore. Все права защищены.</p> <!-- Копирайт -->
        </div> <!-- Конец контейнера -->
    </footer> <!-- Конец подвала -->

    <script src="data.js"></script> <!-- Данные -->
    <script src="catalog.js"></script> <!-- Скрипт каталога -->
    <script src="auth.js"></script> <!-- Авторизация -->
</body> <!-- Конец body -->
</html> <!-- Конец документа -->
