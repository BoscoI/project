  <!DOCTYPE html>
   <html lang="ru">
   <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Корзина - TechStore</title>
       <link rel="stylesheet" href="styles.css">
   </head>
   <body>
       <header class="header">
           <div class="container header-container">
               <div class="logo"><a href="index.html"><h1>TechStore</h1></a></div>
               <nav class="nav" id="nav">
                   <ul class="nav-list">
                       <li><a href="index.html">Каталог</a></li>
                       <li><a href="favorites.html">Избранное <span class="badge" id="favCount">0</span></a></li>
                       <li><a href="cart.html" class="active">Корзина <span class="badge" id="cartCount">0</span></a></li>
                       <li><a href="profile.html">Личный кабинет</a></li>
                       <li><a href="admin.html">Админ панель</a></li>
                       <li><a href="about.html">О нас</a></li>
                       <li><a href="contacts.html">Контакты</a></li>
                   </ul>
               </nav>
               <button class="burger" id="burger"><span></span><span></span><span></span></button>
           </div>
       </header>
       <main class="main">
           <div class="container">
               <div class="content-wrapper-full">
                   <div class="content">
                       <h2>Корзина</h2>
                       <div class="cart-container">
                           <table class="cart-table" id="cartTable">
                               <thead>
                                   <tr>
                                       <th>№</th><th>Наименование</th><th>Цена</th>
                                       <th>Количество</th><th>Сумма</th><th>Действия</th>
                                   </tr>
                               </thead>
                               <tbody id="cartTableBody"></tbody>
                           </table>
                           <div class="cart-total">
                               <h3>Общая сумма: <span id="totalPrice">0</span> ₽</h3>
                               <a href="checkout.html" class="btn btn-primary"
                                  id="checkoutBtn">Оформить заказ</a>
                           </div>
                       </div>
                       <p class="empty-message" id="emptyCart"
                          style="display:none;">Корзина пуста</p>
                   </div>
               </div>
           </div>
       </main>
       <footer class="footer">
           <div class="container"><p>&copy; 2026 TechStore. Все права защищены.</p></div>
       </footer>
       <script src="data.js"></script>
       <script src="cart.js"></script>
       <script src="auth.js"></script>
   </body>
   </html>
